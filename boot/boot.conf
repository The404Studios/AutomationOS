# AutomationOS Boot Configuration
# Format: Simple INI-style configuration

# Global settings
timeout=5

# Default boot entry
[AutomationOS]
kernel=\EFI\BOOT\KERNEL.ELF
initrd=\EFI\BOOT\initrd.img
options=quiet splash
default=yes

# Recovery mode
[AutomationOS (Recovery)]
kernel=\EFI\BOOT\KERNEL.ELF
initrd=\EFI\BOOT\initrd.img
options=recovery nomodeset single

# Previous kernel (for rollback)
[AutomationOS (Previous)]
kernel=\EFI\BOOT\KERNEL.ELF.old
initrd=\EFI\BOOT\initrd.img.old
options=quiet splash

# Debug mode
[AutomationOS (Debug)]
kernel=\EFI\BOOT\KERNEL.ELF
initrd=\EFI\BOOT\initrd.img
options=debug loglevel=7 nokaslr
