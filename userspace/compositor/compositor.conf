# AutomationOS Compositor Configuration

[compositor]
# Enable VSync for tear-free rendering
vsync = true

# Target frame rate (FPS)
fps_target = 60

# Enable visual effects
effects = true

# Enable animations
animations = true

# GPU backend (opengl, drm, auto)
backend = auto

# GPU device path (for DRM backend)
device = /dev/dri/card0

[display]
# Default display resolution
width = 1920
height = 1080
refresh_rate = 60

# Multi-monitor arrangement (side-by-side, stacked, custom)
arrangement = side-by-side

[effects]
# Drop shadows for windows
shadows = true
shadow_offset_x = 0
shadow_offset_y = 4
shadow_blur_radius = 12
shadow_opacity = 0.6

# Background blur for transparent windows
blur = true
blur_radius = 8.0
blur_passes = 2

# Dim inactive windows
dim_inactive = true
dim_factor = 0.15

# Wobbly windows (physics-based wobble on move/resize)
wobbly = false

[animations]
# Window open/close animation duration (milliseconds)
open_duration = 200
close_duration = 200

# Minimize/maximize animation duration
minimize_duration = 300
maximize_duration = 250

# Workspace switch animation duration
workspace_switch_duration = 350

# Default easing function
# Options: linear, ease-in, ease-out, ease-in-out,
#          ease-in-quad, ease-out-quad, ease-in-out-quad,
#          ease-in-cubic, ease-out-cubic, ease-in-out-cubic,
#          bounce, elastic
default_easing = ease-in-out-cubic

[window_manager]
# Enable window decorations
decorations = true

# Decoration height (title bar)
decoration_height = 32

# Window border width
border_width = 1

# Gap between windows in tiling mode
gap_size = 8

# Default placement mode (floating, tiling)
default_placement = floating

# Default tiling mode (horizontal, vertical, grid, master-stack)
default_tiling = horizontal

[shortcuts]
# Window management shortcuts
# Format: modifiers+key = action

# Focus next window
alt+tab = focus_next

# Close window
alt+f4 = close_window

# Maximize window
super+up = maximize_window

# Minimize window
super+down = minimize_window

# Fullscreen
f11 = fullscreen

# Move window (hold Alt and drag)
alt+drag = move_window

# Resize window (hold Alt+Shift and drag)
alt+shift+drag = resize_window

# Switch workspace
super+1 = workspace_1
super+2 = workspace_2
super+3 = workspace_3
super+4 = workspace_4

# Tiling modes
super+h = tiling_horizontal
super+v = tiling_vertical
super+g = tiling_grid

[performance]
# Enable damage tracking for efficient redraws
damage_tracking = true

# Triple buffering for smooth frame pacing
triple_buffering = true

# Maximum number of windows
max_windows = 256

# Maximum number of displays
max_displays = 8

# CPU usage target when idle (percentage)
idle_cpu_target = 1

[debug]
# Enable debug logging
debug = false

# Show FPS counter
show_fps = true

# Log frame times
log_frame_times = false

# Highlight damage regions
show_damage = false
