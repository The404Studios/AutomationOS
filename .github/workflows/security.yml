name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install analysis tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck clang-tidy splint

    - name: Run cppcheck
      run: |
        cppcheck --enable=all --inconclusive --std=c11 \
          --suppress=missingIncludeSystem \
          --template='{file}:{line}:{severity}:{id}:{message}' \
          --output-file=cppcheck-report.txt \
          kernel/ boot/ userspace/ || true

    - name: Run clang-tidy
      run: |
        find kernel/ boot/ userspace/ -name "*.c" -o -name "*.h" | \
          xargs clang-tidy \
          --checks='bugprone-*,cert-*,clang-analyzer-*,concurrency-*,misc-*,performance-*,portability-*,readability-*' \
          > clang-tidy-report.txt 2>&1 || true

    - name: Upload static analysis results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: static-analysis-${{ github.sha }}
        path: |
          cppcheck-report.txt
          clang-tidy-report.txt
        retention-days: 90

    - name: Check for critical issues
      run: |
        if grep -E "error:|style:" cppcheck-report.txt; then
          echo "WARNING: Static analysis found issues"
        fi

  memory-safety:
    name: Memory Safety Analysis
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm gcc-x86-64-elf \
          binutils-x86-64-elf valgrind

    - name: Build with sanitizers
      run: |
        # Build unit tests with AddressSanitizer
        cd tests/unit
        CFLAGS="-fsanitize=address -fno-omit-frame-pointer -g" make all || true

    - name: Run memory safety tests
      run: |
        cd tests/unit
        make test-sanitizer || true

    - name: Check for memory leaks
      run: |
        echo "Memory safety checks completed"

  vulnerability-scan:
    name: Vulnerability Scanning
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'cpp'
        queries: security-and-quality

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm gcc-x86-64-elf binutils-x86-64-elf

    - name: Build for CodeQL
      run: make all || true

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for known vulnerable dependencies
      run: |
        echo "Checking build dependencies..."
        # Check Python dependencies if any
        if [ -f requirements.txt ]; then
          pip3 install safety
          safety check -r requirements.txt || true
        fi

    - name: Audit build tools
      run: |
        echo "Build tool versions:"
        gcc --version || true
        nasm --version || true
        python3 --version
        qemu-system-x86_64 --version || true

  kernel-hardening-check:
    name: Kernel Hardening Check
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential nasm gcc-x86-64-elf \
          binutils-x86-64-elf python3 python3-pip

    - name: Build kernel
      run: make kernel

    - name: Check for security features
      run: |
        echo "Checking kernel security features..."

        # Check if NX bit is enabled
        if grep -r "NX_ENABLED\|noexec" kernel/; then
          echo "✓ NX bit support found"
        else
          echo "⚠ NX bit support not found"
        fi

        # Check for stack protection
        if grep -r "stack_chk\|__stack_chk_guard" kernel/; then
          echo "✓ Stack protection found"
        else
          echo "⚠ Stack protection not found"
        fi

        # Check for ASLR
        if grep -r "KASLR\|randomize" kernel/; then
          echo "✓ ASLR support found"
        else
          echo "⚠ ASLR support not found"
        fi

        # Check for NULL pointer dereference protection
        if grep -r "null.*check\|NULL_CHECK" kernel/; then
          echo "✓ NULL pointer checks found"
        else
          echo "⚠ NULL pointer checks not found"
        fi

    - name: Generate security report
      run: |
        cat > security-report.md << 'EOF'
        # AutomationOS Security Report

        ## Security Features Analyzed

        - NX Bit Support
        - Stack Protection
        - ASLR/KASLR
        - NULL Pointer Dereference Protection
        - Memory Safety
        - Input Validation

        ## Recommendations

        1. Enable stack canaries in production builds
        2. Implement KASLR for kernel address randomization
        3. Add comprehensive input validation for all system calls
        4. Use memory-safe coding practices
        5. Regular security audits and penetration testing

        Generated: $(date)
        EOF

    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-report-${{ github.sha }}
        path: security-report.md
        retention-days: 90

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [static-analysis, memory-safety, vulnerability-scan, codeql-analysis, kernel-hardening-check]
    if: always()

    steps:
    - name: Generate security summary
      run: |
        echo "# Security Scan Summary" > security-summary.md
        echo "" >> security-summary.md
        echo "## Results" >> security-summary.md
        echo "- Static Analysis: ${{ needs.static-analysis.result }}" >> security-summary.md
        echo "- Memory Safety: ${{ needs.memory-safety.result }}" >> security-summary.md
        echo "- Vulnerability Scan: ${{ needs.vulnerability-scan.result }}" >> security-summary.md
        echo "- CodeQL: ${{ needs.codeql-analysis.result }}" >> security-summary.md
        echo "- Kernel Hardening: ${{ needs.kernel-hardening-check.result }}" >> security-summary.md

    - name: Upload summary
      uses: actions/upload-artifact@v4
      with:
        name: security-summary-${{ github.sha }}
        path: security-summary.md
        retention-days: 90
